<script>
// ── SERVICE WORKER (inline as Blob so no extra file needed) ─────────────────
const SW_CODE = `
const CACHE = 'deli-app-v8'; // ← bump this number when you update the app
const ASSETS = [self.location.href.replace(/\\/sw-[^/]+$/, '') || '/'];

self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(c => c.addAll(ASSETS)).then(() => self.skipWaiting())
  );
});

self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
    ).then(() => self.clients.claim())
  );
});

self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  e.respondWith(
    caches.open(CACHE).then(async cache => {
      const cached = await cache.match(e.request);
      const fetchPromise = fetch(e.request).then(res => {
        if (res && res.status === 200) cache.put(e.request, res.clone());
        return res;
      }).catch(() => null);
      return cached || await fetchPromise;
    })
  );
});

// Notify clients when new SW is waiting
self.addEventListener('message', e => {
  if (e.data === 'skipWaiting') self.skipWaiting();
});
`;

let swRegistration = null;
let newWorkerWaiting = false;

function applyUpdate() {
  if (newWorkerWaiting && swRegistration && swRegistration.waiting) {
    swRegistration.waiting.postMessage('skipWaiting');
  }
}

if ('serviceWorker' in navigator) {
  const blob = new Blob([SW_CODE], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);

  navigator.serviceWorker.register(swUrl).then(reg => {
    swRegistration = reg;
    reg.addEventListener('updatefound', () => {
      const nw = reg.installing;
      nw.addEventListener('statechange', () => {
        if (nw.state === 'installed' && navigator.serviceWorker.controller) {
          newWorkerWaiting = true;
          document.getElementById('update-banner').style.display = 'block';
        }
      });
    });
  });

  navigator.serviceWorker.addEventListener('controllerchange', () => {
    window.location.reload();
  });
}
</script>

function ls(key, fb) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fb; } catch { return fb; } }
function sv(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

function Barcode({ value, label }) {
  const bars = useMemo(() => {
    if (!value) return [];
    let hash = 0;
    for (let i = 0; i < value.length; i++) { hash = ((hash << 5) - hash) + value.charCodeAt(i); hash |= 0; }
    const res = []; let seed = Math.abs(hash);
    for (let i = 0; i < 95; i++) {
      seed = (seed * 1664525 + 1013904223) & 0xffffffff;
      res.push({ w: (Math.abs(seed) % 3) + 1, b: i % 2 === 0 });
    }
    res[0].b = true; res[94].b = true;
    return res;
  }, [value]);
  const tw = bars.reduce((s, b) => s + b.w, 0);
  return (
    <div style={{textAlign:"center",padding:"16px 0"}}>
      <svg width="280" height="80" viewBox={`0 0 ${tw} 60`} preserveAspectRatio="none" style={{width:280,height:80}}>
        {(() => { let x=0; return bars.map((b,i) => { const r = b.b ? <rect key={i} x={x} y={0} width={b.w} height={60} fill="#111"/> : null; x+=b.w; return r; }); })()}
      </svg>
      <div style={{fontFamily:"monospace",fontSize:13,letterSpacing:2,color:"#333",marginTop:4}}>{value}</div>
      <div style={{fontSize:12,color:"#666",marginTop:2}}>{label}</div>
    </div>
  );
}

  useEffect(() => { sv("deli_disabled", disabled); }, [disabled]);

    const q = search.toLowerCase();

  const addToCart = (item) => {
    if (item.randomWeight) { setWModal(item); setMW(""); setMP(""); return; }
    setCart(p => { const e=p.find(c=>c.id===item.id); return e ? p.map(c=>c.id===item.id?{...c,qty:c.qty+1}:c) : [...p,{...item,qty:1}]; });
  };
  const confirmWModal = () => {
    if (!wModal||!mW) return;
    setWeights(p=>({...p,[wModal.id]:mW}));
    if (mP) setPrices(p=>({...p,[wModal.id]:mP}));
    setCart(p => { const e=p.find(c=>c.id===wModal.id); return e ? p.map(c=>c.id===wModal.id?{...c,qty:c.qty+1}:c) : [...p,{...wModal,qty:1}]; });

    setReceipts(p=>[receipt,...p]);
    setCart([]); setWeights({}); setPrices({});
    setConfirmDone(false); setView("history");
  };
  const toggleOff = id => setDisabled(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);

  const av = view==="barcode"?"checkout":view;

  const C = (label,on,fn) => (

            </div>
          </div>
        </div>

      {/* WEIGHT MODAL */}
      {wModal && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#fff",borderRadius:16,padding:24,width:"100%",maxWidth:360,boxShadow:"0 8px 32px rgba(0,0,0,.25)"}}>
            <div style={{textAlign:"center",marginBottom:4}}>
              <span style={{background:"#fff3cd",color:"#856404",borderRadius:6,padding:"3px 10px",fontSize:11,fontWeight:700}}>⚖️ SCALE ITEM</span>
            </div>
            <h3 style={{textAlign:"center",margin:"10px 0 4px",fontSize:16,color:"#1a1a2e"}}>{wModal.name}</h3>
            <p style={{textAlign:"center",fontSize:12,color:"#888",margin:"0 0 18px"}}>Item #{wModal.id}{wModal.plu?` · PLU ${wModal.plu}`:""}</p>
            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontSize:12,fontWeight:700,color:"#333",marginBottom:5}}>Weight (lbs) <span style={{color:"#e31837"}}>*</span></label>
              <input autoFocus type="number" min="0" step="0.01" value={mW} onChange={e=>setMW(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&confirmWModal()} placeholder="e.g. 1.25"
                style={{width:"100%",padding:"11px 13px",borderRadius:9,border:mW?"2px solid #003087":"2px solid #ddd",fontSize:16,outline:"none",boxSizing:"border-box"}}/>
            </div>
            <div style={{marginBottom:20}}>
              <label style={{display:"block",fontSize:12,fontWeight:700,color:"#333",marginBottom:5}}>Price per lb ($) <span style={{fontSize:11,color:"#888",fontWeight:400}}>optional</span></label>
              <input type="number" min="0" step="0.01" value={mP} onChange={e=>setMP(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&confirmWModal()} placeholder="e.g. 8.99"
                style={{width:"100%",padding:"11px 13px",borderRadius:9,border:"2px solid #ddd",fontSize:16,outline:"none",boxSizing:"border-box"}}/>
              {mW&&mP && <div style={{marginTop:8,background:"#003087",color:"#fff",borderRadius:8,padding:"8px 12px",fontWeight:700,textAlign:"center"}}>Register amount: ${(parseFloat(mW)*parseFloat(mP)).toFixed(2)}</div>}
            </div>
            <div style={{display:"flex",gap:9}}>
              <button onClick={()=>setWModal(null)} style={{flex:1,background:"#eee",color:"#333",border:"none",borderRadius:9,padding:"11px 0",fontWeight:700,fontSize:14,cursor:"pointer"}}>Cancel</button>
              <button onClick={confirmWModal} disabled={!mW} style={{flex:2,background:mW?"#003087":"#ccc",color:"#fff",border:"none",borderRadius:9,padding:"11px 0",fontWeight:700,fontSize:14,cursor:mW?"pointer":"not-allowed"}}>Add to Cart</button>
            </div>
          </div>
        </div>
      )}

      {/* BOTTOM NAV */}
      <nav className="nav-bar" style={{position:"fixed",bottom:0,left:0,right:0,background:"#fff",borderTop:"1px solid #e0e0e0",display:"flex",zIndex:100,boxShadow:"0 -2px 10px rgba(0,0,0,.07)"}}>
        {[{key:"shop",icon:"🏪",label:"Shop"},{key:"checkout",icon:"🛒",label:"Cart"},{key:"history",icon:"📋",label:"History"},{key:"settings",icon:"⚙️",label:"Settings"}].map(n => {
          const on = av===n.key;
          return (
            <button key={n.key} onClick={()=>setView(n.key)} style={{flex:1,padding:"8px 4px 6px",border:"none",background:"transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:on?"#003087":"#999",fontWeight:on?700:500,fontSize:11,position:"relative"}}>
              <span style={{fontSize:19}}>{n.icon}</span>
              <span>{n.label}</span>
              {n.key==="checkout"&&cartCount>0&&<span style={{position:"absolute",top:5,right:"calc(50% - 18px)",background:"#e31837",color:"#fff",borderRadius:9,padding:"0 5px",fontSize:9,fontWeight:700}}>{cartCount}</span>}
            </button>
          );
        })}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

</body>
</html>
